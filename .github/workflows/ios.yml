name: iOS Build

on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Clean build
        run: flutter clean

      # 🔥 BUILD SEM SIGNING (FUNCIONA SEM MAC)
      - name: Build iOS (no signing)
        run: flutter build ios --release --no-codesign

      # 🔥 CRIAR IPA MANUAL (SEM XCODE SIGNING)
      - name: Create IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      # 🔥 DEBUG
      - name: List files
        run: ls -R

      # 🔥 UPLOAD
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: app.ipa
          if-no-files-found: error
